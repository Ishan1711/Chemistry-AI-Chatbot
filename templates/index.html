<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROCHEM AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

    <div id="app">

        <div id="sidebar">
            <div class="sidebar-title">Features</div>
            <div class="tiles-grid">
                <div class="tile" id="tile-new-chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Chat
                </div>
                <div class="tile active" id="tile-general" onclick="setMode('general')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    General
                </div>
                <div class="tile" id="tile-inorganic" onclick="setMode('inorganic')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 2v7.31"></path>
                        <path d="M14 9.3V1.99"></path>
                        <path d="M8.5 2h7"></path>
                        <path d="M14 9.3a6.5 6.5 0 1 1-4 0"></path>
                        <path d="M5.52 16h12.96"></path>
                    </svg>
                    Inorganic
                </div>
                <div class="tile" id="tile-organic" onclick="setMode('organic')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M12 2.69l5.66 3.27a1.73 1.73 0 0 1 .79 1.88l-1.36 6.36a1.73 1.73 0 0 1-1.42 1.32L10 16.5a1.73 1.73 0 0 1-1.63-.58L5.22 11.2a1.73 1.73 0 0 1-.2-1.92L8.5 3.9a1.73 1.73 0 0 1 1.5-.96H12z">
                        </path>
                    </svg>
                    Organic
                </div>
                <div class="tile" id="tile-reaction" onclick="setMode('reaction')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 16v-4"></path>
                        <path d="M12 8h.01"></path>
                    </svg>
                    Reactions
                </div>
                <div class="tile" id="tile-difference" onclick="setMode('difference')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20V4"></path>
                        <path d="M5 15l-3-3 3-3"></path>
                        <path d="M19 9l3 3-3 3"></path>
                    </svg>
                    Difference
                </div>
            </div>
            <div class="sidebar-title">History</div>
            <div id="history"></div>
        </div>

        <div id="main">
            <div id="main-content-wrapper">
                <div id="header">
                    <h1 class="welcome-heading">Let's chat about Chemistry, Buddy !!!</h1>
                    <div class="mode-indicator">NEUROCHEM AI <span id="current-mode-display">(General)</span></div>
                </div>

                <div id="chat-box"></div>

                <div id="input-area-wrapper">
                    <div id="input-area">
                        <button class="icon-btn" id="plus-btn" title="Add attachment">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                        <div id="single-input-container" style="flex: 1; display: flex;">
                            <textarea id="input" placeholder="Ask chemistry..."></textarea>
                        </div>
                        <div id="dual-input-container" style="flex: 1; display: none; gap: 10px; align-items: center;">
                            <textarea id="input-1" placeholder="Item 1..." style="flex: 1;"></textarea>
                            <div class="vs-badge" style="font-weight: bold; color: #6b7280; font-size: 12px;">VS</div>
                            <textarea id="input-2" placeholder="Item 2..." style="flex: 1;"></textarea>
                        </div>
                        <button class="icon-btn" id="mic-btn" title="Voice input">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                <line x1="12" y1="19" x2="12" y2="23"></line>
                                <line x1="8" y1="23" x2="16" y2="23"></line>
                            </svg>
                        </button>
                        <button id="send-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <div class="disclaimer">NEUROCHEM can make mistakes. Verify important information.</div>
                </div>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>

</body>

</html>
